<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 2026 世界杯实时直播 | WebSocket Live</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg-primary:#f8fafc;--bg-secondary:#ffffff;--bg-card:#ffffff;--bg-hover:#f1f5f9;
  --text-primary:#0f172a;--text-secondary:#475569;--text-muted:#64748b;
  --border-color:#e2e8f0;--accent:#d97706;--accent-light:#fef3c7;--accent-text:#92400e;
  --success:#16a34a;--success-bg:#dcfce7;--danger:#dc2626;--danger-bg:#fee2e2;
  --warning:#ca8a04;--warning-bg:#fef9c3;--info:#2563eb;--info-bg:#dbeafe;
  --shadow:0 4px 6px -1px rgba(0,0,0,0.1);--shadow-lg:0 10px 15px -3px rgba(0,0,0,0.1);
}
[data-theme="dark"] {
  --bg-primary:#0f172a;--bg-secondary:#1e293b;--bg-card:rgba(30,41,59,0.95);--bg-hover:rgba(51,65,85,0.5);
  --text-primary:#f8fafc;--text-secondary:#cbd5e1;--text-muted:#94a3b8;
  --border-color:rgba(255,255,255,0.1);--accent:#fbbf24;--accent-light:rgba(251,191,36,0.15);--accent-text:#fbbf24;
  --success:#4ade80;--success-bg:rgba(74,222,128,0.15);--danger:#f87171;--danger-bg:rgba(248,113,113,0.15);
  --warning:#fbbf24;--warning-bg:rgba(251,191,36,0.15);--info:#60a5fa;--info-bg:rgba(96,165,250,0.15);
  --shadow:0 4px 6px -1px rgba(0,0,0,0.3);--shadow-lg:0 10px 15px -3px rgba(0,0,0,0.4);
}
* { scrollbar-width:thin; scrollbar-color:var(--accent) var(--bg-secondary); }
body { background:var(--bg-primary); color:var(--text-primary); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; transition:all 0.3s; }
.glass-card { background:var(--bg-card); border:1px solid var(--border-color); border-radius:16px; box-shadow:var(--shadow); transition:all 0.3s; }
.glass-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); border-color:var(--accent); }
.ws-connected { color:var(--success); animation:pulse 2s infinite; }
.ws-disconnected { color:var(--danger); }
.ws-connecting { color:var(--warning); animation:spin 1s linear infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
@keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
@keyframes goalPop { 0%{transform:scale(0.5);opacity:0} 50%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
.goal-notification {
  position:fixed; top:80px; right:20px; z-index:1000;
  padding:16px 24px; border-radius:16px;
  background:linear-gradient(135deg,#d97706,#b45309);
  color:white; font-weight:700; box-shadow:0 10px 30px rgba(217,119,6,0.4);
  animation:slideIn 0.5s ease, goalPop 0.6s ease;
  max-width:350px;
}
.goal-notification .close { position:absolute; top:8px; right:12px; cursor:pointer; opacity:0.7; }
.goal-notification .close:hover { opacity:1; }
.match-card-live { border-left:4px solid var(--danger); animation:liveBorder 2s infinite; }
@keyframes liveBorder { 0%,100%{border-left-color:var(--danger)} 50%{border-left-color:var(--success)} }
.event-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px; }
.event-goal { background:var(--success); }
.event-yellow { background:var(--warning); }
.event-red { background:var(--danger); }
.live-timer { font-family:'Courier New',monospace; font-weight:700; }
.theme-toggle { width:48px; height:48px; border-radius:50%; border:2px solid var(--border-color); background:var(--bg-secondary); color:var(--text-primary); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:20px; transition:all 0.3s; }
.theme-toggle:hover { border-color:var(--accent); transform:rotate(20deg); }
.log-entry { padding:8px 12px; border-radius:8px; margin-bottom:4px; font-size:13px; font-family:monospace; }
.log-info { background:var(--info-bg); color:var(--info); }
.log-success { background:var(--success-bg); color:var(--success); }
.log-warning { background:var(--warning-bg); color:var(--warning); }
.log-error { background:var(--danger-bg); color:var(--danger); }
.stat-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:20px; font-size:13px; font-weight:600; }
.btn { padding:10px 20px; border-radius:12px; font-weight:600; cursor:pointer; border:none; transition:all 0.3s; }
.btn-primary { background:linear-gradient(135deg,#d97706,#b45309); color:white; box-shadow:0 4px 14px rgba(217,119,6,0.35); }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(217,119,6,0.45); }
.btn-secondary { background:var(--bg-hover); color:var(--text-primary); border:2px solid var(--border-color); }
.btn-secondary:hover { border-color:var(--accent); background:var(--accent-light); color:var(--accent-text); }
.score-big { font-size:48px; font-weight:900; font-family:'Courier New',monospace; }
::-webkit-scrollbar { width:8px; }
::-webkit-scrollbar-track { background:var(--bg-secondary); }
::-webkit-scrollbar-thumb { background:var(--accent); border-radius:4px; }
</style>
</head>
<body>

<!-- 进球通知容器 -->
<div id="goal-notifications"></div>

<header class="sticky top-0 z-50 backdrop-blur-lg" style="background:linear-gradient(135deg,var(--bg-secondary) 0%,var(--bg-primary) 100%);border-bottom:2px solid var(--border-color)">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="text-4xl">🏆</div>
      <div>
        <h1 class="text-xl font-bold" style="color:var(--text-primary)">2026 世界杯实时直播</h1>
        <p class="text-xs font-medium" style="color:var(--text-muted)">WebSocket 实时推送 · 零延迟</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <!-- WebSocket 连接状态 -->
      <div id="ws-status" class="stat-badge" style="background:var(--warning-bg);color:var(--warning)">
        <i class="fas fa-circle-notch ws-connecting" id="ws-icon"></i>
        <span id="ws-text">连接中...</span>
      </div>
      <div class="text-sm font-medium" style="color:var(--text-muted)" id="current-time"></div>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题"><i class="fas fa-moon" id="theme-icon"></i></button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-6">

  <!-- 连接控制面板 -->
  <div class="glass-card p-5 mb-6">
    <div class="flex items-center justify-between flex-wrap gap-4">
      <div>
        <h2 class="text-lg font-bold mb-1" style="color:var(--text-primary)">🔌 WebSocket 连接控制</h2>
        <p class="text-sm" style="color:var(--text-muted)">服务器: <code id="server-url" style="background:var(--bg-hover);padding:2px 8px;border-radius:4px">ws://localhost:3000</code></p>
      </div>
      <div class="flex gap-2">
        <button onclick="connectWS()" class="btn btn-primary" id="btn-connect"><i class="fas fa-plug mr-2"></i>连接</button>
        <button onclick="disconnectWS()" class="btn btn-secondary" id="btn-disconnect" disabled><i class="fas fa-times mr-2"></i>断开</button>
        <button onclick="testGoal()" class="btn btn-secondary"><i class="fas fa-bolt mr-2"></i>模拟进球</button>
      </div>
    </div>
    <div class="mt-4 p-3 rounded-lg" style="background:var(--bg-hover);border:1px solid var(--border-color)">
      <div class="text-xs font-bold mb-2" style="color:var(--text-muted)">📡 连接日志</div>
      <div id="ws-logs" style="max-height:120px;overflow-y:auto;font-family:monospace;font-size:12px"></div>
    </div>
  </div>

  <!-- 实时比赛卡片 -->
  <div class="glass-card p-6 mb-6">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-xl font-bold" style="color:var(--text-primary)">
        <i class="fas fa-broadcast-tower mr-2" style="color:var(--danger)"></i>实时比赛
        <span class="text-sm font-normal ml-2" style="color:var(--text-muted)">(自动推送)</span>
      </h2>
      <span class="stat-badge" style="background:var(--danger-bg);color:var(--danger)">
        <span class="w-2 h-2 rounded-full bg-red-500 live-indicator"></span>
        <span id="live-count">0 场进行中</span>
      </span>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4" id="live-matches"></div>
  </div>

  <!-- 实时事件流 -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2">
      <div class="glass-card p-6">
        <h2 class="text-xl font-bold mb-4" style="color:var(--text-primary)">
          <i class="fas fa-list-ul mr-2" style="color:var(--info)"></i>实时事件流
        </h2>
        <div id="event-stream" style="max-height:400px;overflow-y:auto">
          <div class="text-center py-8" style="color:var(--text-muted)">
            <i class="fas fa-satellite-dish text-4xl mb-3 opacity-30"></i>
            <p>等待 WebSocket 连接...</p>
          </div>
        </div>
      </div>
    </div>
    <div>
      <div class="glass-card p-6">
        <h2 class="text-xl font-bold mb-4" style="color:var(--text-primary)">
          <i class="fas fa-tachometer-alt mr-2" style="color:var(--accent)"></i>连接统计
        </h2>
        <div class="space-y-4">
          <div class="flex justify-between py-2" style="border-bottom:1px solid var(--border-color)">
            <span style="color:var(--text-muted)">连接状态</span>
            <span class="font-bold" id="stat-status" style="color:var(--warning)">未连接</span>
          </div>
          <div class="flex justify-between py-2" style="border-bottom:1px solid var(--border-color)">
            <span style="color:var(--text-muted)">消息接收</span>
            <span class="font-bold" id="stat-messages" style="color:var(--info)">0</span>
          </div>
          <div class="flex justify-between py-2" style="border-bottom:1px solid var(--border-color)">
            <span style="color:var(--text-muted)">最后更新</span>
            <span class="font-bold" id="stat-last" style="color:var(--text-muted)">-</span>
          </div>
          <div class="flex justify-between py-2" style="border-bottom:1px solid var(--border-color)">
            <span style="color:var(--text-muted)">延迟</span>
            <span class="font-bold" id="stat-latency" style="color:var(--success)">- ms</span>
          </div>
          <div class="flex justify-between py-2">
            <span style="color:var(--text-muted)">在线用户</span>
            <span class="font-bold" id="stat-users" style="color:var(--accent)">1</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</main>

<footer class="mt-12 py-8 text-center text-sm font-medium" style="border-top:2px solid var(--border-color);color:var(--text-muted)">
  <p>⚽ WebSocket Real-time World Cup 2026 · 零延迟推送</p>
</footer>

<script>
// ===================== THEME =====================
function toggleTheme() {
  const html = document.documentElement, icon = document.getElementById('theme-icon');
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme'); icon.className = 'fas fa-moon';
    localStorage.setItem('theme', 'light');
  } else {
    html.setAttribute('data-theme', 'dark'); icon.className = 'fas fa-sun';
    localStorage.setItem('theme', 'dark');
  }
}
if (localStorage.getItem('theme') === 'dark') {
  document.documentElement.setAttribute('data-theme', 'dark');
  document.getElementById('theme-icon').className = 'fas fa-sun';
}

// ===================== WEBSOCKET =====================
let ws = null;
let messageCount = 0;
let reconnectTimer = null;
const WS_URL = 'ws://localhost:3000';

function log(type, message) {
  const logs = document.getElementById('ws-logs');
  const entry = document.createElement('div');
  entry.className = `log-entry log-${type}`;
  entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
  logs.appendChild(entry);
  logs.scrollTop = logs.scrollHeight;
}

function updateStatus(status, text) {
  const badge = document.getElementById('ws-status');
  const icon = document.getElementById('ws-icon');
  const txt = document.getElementById('ws-text');
  const stat = document.getElementById('stat-status');

  icon.className = status === 'connected' ? 'fas fa-circle ws-connected' : 
                   status === 'connecting' ? 'fas fa-circle-notch ws-connecting' : 
                   'fas fa-circle ws-disconnected';

  const colors = {
    connected: { bg: 'var(--success-bg)', text: 'var(--success)' },
    connecting: { bg: 'var(--warning-bg)', text: 'var(--warning)' },
    disconnected: { bg: 'var(--danger-bg)', text: 'var(--danger)' }
  };
  const c = colors[status] || colors.disconnected;
  badge.style.background = c.bg;
  badge.style.color = c.text;
  txt.textContent = text;
  stat.textContent = text;
  stat.style.color = c.text;
}

function connectWS() {
  if (ws && ws.readyState === WebSocket.OPEN) return;

  updateStatus('connecting', '连接中...');
  log('warning', '正在连接 WebSocket 服务器...');
  document.getElementById('btn-connect').disabled = true;

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    updateStatus('connected', '已连接');
    log('success', 'WebSocket 连接成功！');
    document.getElementById('btn-connect').disabled = true;
    document.getElementById('btn-disconnect').disabled = false;

    // 发送订阅请求
    ws.send(JSON.stringify({ action: 'subscribe', channels: ['all'] }));
  };

  ws.onmessage = (event) => {
    messageCount++;
    document.getElementById('stat-messages').textContent = messageCount;
    document.getElementById('stat-last').textContent = new Date().toLocaleTimeString();

    try {
      const data = JSON.parse(event.data);
      handleServerMessage(data);
    } catch (e) {
      log('error', '解析消息失败: ' + e.message);
    }
  };

  ws.onclose = () => {
    updateStatus('disconnected', '已断开');
    log('error', 'WebSocket 连接已关闭');
    document.getElementById('btn-connect').disabled = false;
    document.getElementById('btn-disconnect').disabled = true;

    // 自动重连
    if (!reconnectTimer) {
      log('warning', '5秒后自动重连...');
      reconnectTimer = setTimeout(() => { reconnectTimer = null; connectWS(); }, 5000);
    }
  };

  ws.onerror = (err) => {
    updateStatus('disconnected', '连接错误');
    log('error', 'WebSocket 错误: ' + err.message);
  };
}

function disconnectWS() {
  if (ws) {
    ws.close();
    ws = null;
  }
  if (reconnectTimer) {
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
  }
}

function handleServerMessage(data) {
  switch(data.type) {
    case 'welcome':
      log('success', data.message);
      break;

    case 'initial_data':
      renderMatches(data.data);
      log('info', '收到初始数据: ' + (Array.isArray(data.data) ? data.data.length : 0) + ' 场比赛');
      break;

    case 'status_update':
      renderMatches(data.data);
      break;

    case 'goal':
      showGoalNotification(data.team, data.player, data.minute, data.newScore);
      addEventToStream('⚽ 进球！', `${data.team} - ${data.player} (${data.minute}') 比分: ${data.newScore}`, 'success');
      break;

    case 'match_end':
      addEventToStream('🏁 比赛结束', `最终比分: ${data.finalScore}`, 'info');
      break;

    case 'heartbeat':
      const latency = Date.now() - data.time;
      document.getElementById('stat-latency').textContent = latency + ' ms';
      break;

    case 'pong':
      const pongLatency = Date.now() - data.time;
      document.getElementById('stat-latency').textContent = pongLatency + ' ms';
      break;

    default:
      log('info', '收到消息: ' + data.type);
  }
}

// ===================== UI 渲染 =====================
function renderMatches(matches) {
  const container = document.getElementById('live-matches');
  if (!matches || matches.length === 0) {
    container.innerHTML = '<div class="text-center py-8" style="color:var(--text-muted)">暂无进行中的比赛</div>';
    return;
  }

  let liveCount = 0;
  container.innerHTML = matches.map(m => {
    if (m.status === 'LIVE') liveCount++;
    const isLive = m.status === 'LIVE';
    return `
    <div class="team-card ${isLive ? 'match-card-live' : ''}">
      <div class="flex justify-between items-center mb-4">
        <div class="flex items-center gap-2">
          <span class="text-xs font-bold px-2 py-1 rounded" style="background:${isLive ? 'var(--danger-bg)' : 'var(--success-bg)'};color:${isLive ? 'var(--danger)' : 'var(--success)'}">
            ${isLive ? '● LIVE' : 'FT'}
          </span>
          <span class="text-xs font-medium" style="color:var(--text-muted)">第 ${m.time || 90} 分钟</span>
        </div>
        <span class="text-xs font-medium" style="color:var(--text-muted)">ID: ${m.id}</span>
      </div>
      <div class="flex items-center justify-between">
        <div class="text-center flex-1">
          <div class="text-4xl mb-2">${m.home}</div>
          <div class="text-sm font-bold" style="color:var(--text-muted)">${m.home}</div>
        </div>
        <div class="text-center px-6">
          <div class="score-big" style="color:var(--accent)">${m.score.home} - ${m.score.away}</div>
          ${isLive ? '<div class="live-timer text-sm mt-1" style="color:var(--danger)">' + m.time + ''</div>' : ''}
        </div>
        <div class="text-center flex-1">
          <div class="text-4xl mb-2">${m.away}</div>
          <div class="text-sm font-bold" style="color:var(--text-muted)">${m.away}</div>
        </div>
      </div>
      ${m.events && m.events.length > 0 ? `
      <div class="mt-4 pt-4" style="border-top:1px solid var(--border-color)">
        <div class="text-xs font-bold mb-2" style="color:var(--text-muted)">比赛事件</div>
        <div class="space-y-1">
          ${m.events.slice(-3).map(e => `
            <div class="flex items-center text-sm">
              <span class="event-dot event-${e.type}"></span>
              <span class="font-bold" style="color:var(--text-muted)">${e.minute}'</span>
              <span class="ml-2" style="color:var(--text-primary)">${e.player} (${e.team})</span>
            </div>
          `).join('')}
        </div>
      </div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('live-count').textContent = liveCount + ' 场进行中';
}

function showGoalNotification(team, player, minute, score) {
  const container = document.getElementById('goal-notifications');
  const notif = document.createElement('div');
  notif.className = 'goal-notification';
  notif.innerHTML = `
    <div class="close" onclick="this.parentElement.remove()">×</div>
    <div class="flex items-center gap-3">
      <div class="text-3xl">⚽</div>
      <div>
        <div class="font-bold text-lg">GOAL!</div>
        <div class="text-sm opacity-90">${team} - ${player}</div>
        <div class="text-sm opacity-75">${minute}' | 比分: ${score}</div>
      </div>
    </div>
  `;
  container.appendChild(notif);

  // 播放音效（可选）
  // new Audio('goal.mp3').play().catch(() => {});

  // 5秒后自动移除
  setTimeout(() => notif.remove(), 5000);
}

function addEventToStream(title, detail, type) {
  const stream = document.getElementById('event-stream');
  // 移除空状态
  if (stream.querySelector('.text-center')) {
    stream.innerHTML = '';
  }

  const entry = document.createElement('div');
  entry.className = `p-3 rounded-lg mb-2`;
  entry.style.cssText = `background: var(--${type === 'success' ? 'success' : type === 'info' ? 'info' : 'warning'}-bg); border-left: 4px solid var(--${type === 'success' ? 'success' : type === 'info' ? 'info' : 'warning'});`;
  entry.innerHTML = `
    <div class="flex items-center justify-between">
      <div>
        <div class="font-bold text-sm" style="color:var(--text-primary)">${title}</div>
        <div class="text-xs mt-1" style="color:var(--text-secondary)">${detail}</div>
      </div>
      <span class="text-xs font-mono" style="color:var(--text-muted)">${new Date().toLocaleTimeString()}</span>
    </div>
  `;
  stream.insertBefore(entry, stream.firstChild);

  // 限制条目数量
  while (stream.children.length > 20) {
    stream.removeChild(stream.lastChild);
  }
}

// 模拟进球测试
function testGoal() {
  showGoalNotification('Brazil', 'Vinicius Jr.', 67, '2-1');
  addEventToStream('⚽ 进球！', 'Brazil - Vinicius Jr. (67') 比分: 2-1', 'success');
}

// 时间更新
function updateTime() {
  document.getElementById('current-time').textContent = new Date().toLocaleString('zh-CN', {
    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}

// 自动连接（如果服务器可用）
setTimeout(() => {
  connectWS();
}, 1000);

updateTime();
setInterval(updateTime, 1000);
</script>

</body>
</html>
